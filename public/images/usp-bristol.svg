<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 40" fill="white">
  <!-- Left tower -->
  <rect x="6" y="8" width="6" height="28" rx="1"/>
  <rect x="4" y="6" width="10" height="4" rx="1"/>
  <rect x="5" y="32" width="8" height="6" rx="1"/>
  <!-- Right tower -->
  <rect x="52" y="8" width="6" height="28" rx="1"/>
  <rect x="50" y="6" width="10" height="4" rx="1"/>
  <rect x="51" y="32" width="8" height="6" rx="1"/>
  <!-- Bridge deck -->
  <rect x="4" y="30" width="56" height="2.5" rx="1"/>
  <!-- Main cables (catenary curves) -->
  <path d="M9 8 Q32 22 55 8" fill="none" stroke="white" stroke-width="1.8"/>
  <path d="M9 10 Q32 24 55 10" fill="none" stroke="white" stroke-width="1.2"/>
  <!-- Vertical suspender cables -->
  <line x1="16" y1="12" x2="16" y2="30" stroke="white" stroke-width="0.8" opacity="0.7"/>
  <line x1="24" y1="16" x2="24" y2="30" stroke="white" stroke-width="0.8" opacity="0.7"/>
  <line x1="32" y1="18" x2="32" y2="30" stroke="white" stroke-width="0.8" opacity="0.7"/>
  <line x1="40" y1="16" x2="40" y2="30" stroke="white" stroke-width="0.8" opacity="0.7"/>
  <line x1="48" y1="12" x2="48" y2="30" stroke="white" stroke-width="0.8" opacity="0.7"/>
  <!-- Tower windows/details -->
  <rect x="8" y="14" width="2" height="3" rx="0.5" fill="none" stroke="white" stroke-width="0.6" opacity="0.5"/>
  <rect x="8" y="20" width="2" height="3" rx="0.5" fill="none" stroke="white" stroke-width="0.6" opacity="0.5"/>
  <rect x="54" y="14" width="2" height="3" rx="0.5" fill="none" stroke="white" stroke-width="0.6" opacity="0.5"/>
  <rect x="54" y="20" width="2" height="3" rx="0.5" fill="none" stroke="white" stroke-width="0.6" opacity="0.5"/>
</svg>