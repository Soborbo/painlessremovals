name = 'painlessremovals-website'
compatibility_date = "2026-04-15"
compatibility_flags = ["nodejs_compat"]

# Dashboard is the source of truth for plain env vars and secrets.
# Without this, `wrangler deploy` would wipe any var set only in the dashboard.
keep_vars = true

# Static assets binding — Workers Static Assets.
# The @astrojs/cloudflare adapter generates `dist/server/wrangler.json` at build
# time, with `main = "entry.mjs"` and `assets.directory = "../client"`. Always
# deploy via `wrangler deploy --config ./dist/server/wrangler.json` (this root
# wrangler.toml is the source — fields propagate into the generated config).
# The `directory` value here is overridden by the adapter to `../client`.
[assets]
directory = "./dist"
binding = "ASSETS"
html_handling = "auto-trailing-slash"
# Don't set `not_found_handling = "404-page"` — Cloudflare treats it as a
# hard short-circuit for browser navigation (Sec-Fetch-Dest: document) and
# serves /404.html without ever invoking the Worker, breaking SSR routes
# (/instantquote/*, /api/*) in real browsers (curl and fetch still hit the
# Worker, which is why this hides until you load the URL in a browser).
# The Astro adapter renders the prerendered 404.astro itself when no route
# matches, so the branded 404 still works for genuinely-missing paths.

# KV namespaces (created via `wrangler kv namespace create` / MCP).
# SESSION is auto-enabled by @astrojs/cloudflare (Astro's built-in session feature).
# We don't actively use it, but the binding must exist or the worker fails to load.
[[kv_namespaces]]
binding = "SESSION"
id = "ce6ead73cf464a6888d567bb96d68b27"

[[kv_namespaces]]
binding = "RATE_LIMITER"
id = "b9ceca436b2d44e0a9d4dca42b998da8"

# SESSIONS removed: it was provisioned for a server-side calculator quote
# state that never shipped. Quote state lives in client sessionStorage; no
# code reads `env.SESSIONS`. Delete the namespace via:
#   wrangler kv namespace delete --namespace-id=cfc7e5916f054125922731a9ddbce29a

# Server-side conversions reach the event-gateway Worker through this binding, NOT
# through a plain fetch to painlessremovals.com/api/event/*. That URL is a Worker
# route on our own zone, and a Worker subrequest cannot re-enter another Worker
# route on the same zone — Cloudflare short-circuits it, so the gateway never sees
# the event while the lead endpoint still returns 200 (a silent zero).
[[services]]
binding = "EVENT_GATEWAY"
service = "event-gateway"

# Gateway smoke test. A conversion is routed to Meta's *Test* stream ONLY when the
# lead's email is TRACKING_TEST_LEAD_EMAIL (see lib/tracking/gateway-dispatch.ts).
# Keyed on the lead, not on a global flag, so a REAL lead can never be diverted into
# the Test stream — which is why these are safe to leave set, and why the whole
# chain stays re-testable at any time without touching live config.
# TRACKING_TEST_EVENT_CODE should be the code shown in Meta Events Manager →
# Test Events for this pixel; any value keeps the event out of the production
# dataset, but only the real one makes it visible in that tab.
[vars]
TRACKING_TEST_LEAD_EMAIL = "gateway-smoke-test@soborbo.co.uk"
TRACKING_TEST_EVENT_CODE = "TEST_PAINLESS"

# Plain env vars and secrets are managed in the Cloudflare dashboard
# (Workers > painlessremovals-worker > Settings > Variables and Secrets).
# `keep_vars = true` above prevents `wrangler deploy` from wiping them.
#
# Expected vars (set in dashboard):
#   Plain text: ENVIRONMENT, SITE_URL, PUBLIC_TURNSTILE_SITE_KEY,
#     GTM_ID, GA4_MEASUREMENT_ID,
#     ERROR_SHEETS_ID, ERROR_SHEETS_TAB, GOOGLE_SERVICE_ACCOUNT_EMAIL, ERROR_EMAIL_TO,
#     ERROR_ALERT_FROM, IMVE_API_URL
#   Secrets: RESEND_API_KEY, TURNSTILE_SECRET_KEY, GA4_API_SECRET,
#     GOOGLE_MAPS_API_KEY, GOOGLE_SERVICE_ACCOUNT_KEY,
#     IMVE_API_KEY, HEALTH_CHECK_TOKEN, IP_HASH_SALT
#
#   META_PIXEL_ID / META_CAPI_ACCESS_TOKEN / META_CAPI_TEST_EVENT_CODE are
#   NO LONGER read by this app — Meta CAPI moved to the Soborbo
#   event-gateway Worker (its SITE_CONFIG KV holds the credentials).
#   If still set on this Worker they are inert; safe to delete.
#
# Painless-CRM signed webhooks (SENDER half — see README "CRM webhooks"):
#   Plain text: CRM_BASE_URL (e.g. https://crm.painless.example, no trailing
#     slash), CRM_COMPANY_ID (CRM tenant uuid), CRM_WEBHOOK_SOURCE (optional,
#     defaults to "website"), CRM_PRICING_VERSION_ID (optional pricing version
#     uuid for the /quote webhook).
#   Secret: CRM_WEBHOOK_SECRET — shared HMAC secret, 32+ chars, MUST be
#     byte-identical to the CRM's value. Set via:
#       wrangler secret put CRM_WEBHOOK_SECRET
#     NEVER expose it to the client (no PUBLIC_ prefix, never in import.meta.env
#     reaching the browser). All signing happens server-side in the Worker.

# Observability — Workers Logs enabled at 100% sampling.
# Top-level `enabled = false` is the legacy unified flag; we use the per-channel
# `logs.enabled = true` instead. Traces stay off (extra cost, not needed for
# our debugging needs).
[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
