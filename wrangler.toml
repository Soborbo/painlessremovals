name = "painlessremovals-worker"
compatibility_date = "2025-12-01"
compatibility_flags = ["nodejs_compat"]

# Static assets binding — Workers Static Assets.
# The @astrojs/cloudflare adapter generates the worker entry point during build.
# We don't set `main` here; instead the build output is consumed by `wrangler deploy`
# which discovers `dist/_worker.js/index.js` automatically when present.
[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "404-page"
html_handling = "auto-trailing-slash"

# KV namespaces — IDs must be filled in from `wrangler kv namespace create` output.
# SESSION is auto-enabled by @astrojs/cloudflare (Astro's built-in session feature).
# We don't actively use it, but the binding must exist or the worker fails to load.
[[kv_namespaces]]
binding = "SESSION"
id = "PLACEHOLDER_SESSION_KV_ID"

[[kv_namespaces]]
binding = "RATE_LIMITER"
id = "PLACEHOLDER_RATE_LIMITER_KV_ID"

[[kv_namespaces]]
binding = "SESSIONS"
id = "PLACEHOLDER_SESSIONS_KV_ID"

# Plain env vars (non-secret).
# Secrets (RESEND_API_KEY, TURNSTILE_SECRET_KEY, GA4_API_SECRET, META_CAPI_ACCESS_TOKEN,
# GOOGLE_MAPS_API_KEY, GOOGLE_SERVICE_ACCOUNT_KEY, IMVE_API_KEY, HEALTH_CHECK_TOKEN,
# IP_HASH_SALT) are set via `wrangler secret put <NAME>`.
[vars]
PUBLIC_TURNSTILE_SITE_KEY = "0x4AAAAAACs7GfndiZsA_2c4"
SITE_URL = "https://painlessremovals.com"
ENVIRONMENT = "production"
GTM_ID = "GTM-PXTH5JJK"
# Fill in from existing painlessv3 project config:
GA4_MEASUREMENT_ID = "PLACEHOLDER_G_XXXXXXXX"
META_PIXEL_ID = "PLACEHOLDER_META_PIXEL_ID"
META_CAPI_TEST_EVENT_CODE = ""
ERROR_SHEETS_ID = "PLACEHOLDER_SHEETS_ID"
GOOGLE_SERVICE_ACCOUNT_EMAIL = "PLACEHOLDER_SERVICE_ACCOUNT_EMAIL"
ERROR_EMAIL_TO = "PLACEHOLDER_ERROR_EMAIL"
ERROR_ALERT_FROM = "PLACEHOLDER_ALERT_FROM"
IMVE_API_URL = ""
